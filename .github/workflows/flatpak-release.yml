name: CI-release-on-new-tag
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: deadbeef.flatpak
          manifest-path: music.deadbeef.player.json
          cache-key: flatpak-builder-${{ github.sha }}
      # Only produce artifacts, no release
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deadbeef.flatpak
          path: deadbeef.flatpak
